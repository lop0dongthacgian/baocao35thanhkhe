<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>Ứng dụng báo cáo • BCT & CTV</title>
  <meta name="theme-color" content="#a8edea">
  <meta name="apple-mobile-web-app-title" content="BÁO CÁO  BCT & CTV 35">
  <link rel="manifest" href="manifest.json">
  <script src="pwa-core.js"></script>
  <!-- icon.png đặt cùng thư mục -->
  <link rel="icon" type="image/png" href="icon.png">
  <!-- Font và style nền xanh nhạt đa màu -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #e0f2e9 0%, #c8e6d9 25%, #d4ecdf 50%, #b8dfca 75%, #d9f0e1 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* Họa tiết nền đa sắc nhẹ */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(165, 215, 185, 0.5) 0%, transparent 45%),
                  radial-gradient(circle at 80% 70%, rgba(120, 190, 150, 0.4) 0%, transparent 50%),
                  radial-gradient(circle at 40% 85%, rgba(180, 210, 160, 0.45) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 580px;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: linear-gradient(135deg, rgba(255,255,255,0.8) 0%, rgba(240,255,245,0.75) 100%);
      border-radius: 1.5rem;
      box-shadow: 0 30px 50px rgba(50, 90, 70, 0.2), 0 10px 25px rgba(30, 70, 50, 0.15);
      padding: 2.5rem 2rem;
      border: 1px solid rgba(90, 140, 110, 0.25);
      transition: all 0.2s ease;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2.5rem;
    }

    .icon-wrapper {
      background: #eefaf3;
      padding: 0.8rem;
      border-radius: 3rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-icon {
      width: 120px;
      height: 120px;
      object-fit: contain;
      filter: drop-shadow(0 6px 8px rgba(0,70,40,0.2));
    }

    h1 {
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0;
  color: #1f4b33;

  margin-bottom: 0.25rem;
  text-align: center;
  line-height: 1.45;

  /* giúp render dấu tiếng Việt đẹp hơn */
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}

    .subtitle {
      color: #2f5a45;
      font-weight: 500;
      font-size: 0.7rem;
      background: rgba(220, 240, 225, 0.7);
      padding: 0.35rem 1.4rem;
      border-radius: 1rem;
      backdrop-filter: blur(4px);
    }

    .button-panel {
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      margin: 2rem 0 1.2rem;
    }

    .report-btn {
      border: none;
      background: #ffffffdd;
      backdrop-filter: blur(10px);
      background: linear-gradient(105deg, #f6fff9 0%, #eafbf2 100%);
      border: 1.5px solid #b6d7c2;
      border-radius: 1rem;
      padding: 1.6rem 1.8rem;
      font-weight: 650;
      font-size: 1.5rem;
      letter-spacing: 0.3px;
      color: #1d4730;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      box-shadow: 0 15px 25px -10px rgba(40, 90, 60, 0.25);
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      text-decoration: none;
    }

    .report-btn:hover {
      transform: translateY(-3px);
      background: #f0fef6;
      border-color: #7ebc94;
      box-shadow: 0 22px 35px -12px rgba(35, 95, 60, 0.35);
    }

    .report-btn:active {
      transform: translateY(1px);
      box-shadow: 0 10px 18px -8px rgba(35, 80, 50, 0.3);
    }

    .btn-bct {
      background: linear-gradient(105deg, #dff0e5 0%, #c5e3d2 100%);
      border-color: #8bb99b;
    }

    .btn-ctv {
      background: linear-gradient(105deg, #e3f3ea 0%, #cfe6d9 100%);
      border-color: #93bda4;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .btn-title {
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .btn-desc {
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0.8;
      color: #205134;
    }

    .btn-icon {
      font-size: 2.4rem;
      filter: drop-shadow(0 4px 5px rgba(0,60,30,0.3));
    }

    .footer-note {
      text-align: center;
      margin-top: 2rem;
      color: #386a4b;
      font-weight: 500;
      font-size: 0.7rem;
      opacity: 0.9;
    }

    @media (max-width: 450px) {
      .container {
        padding: 2rem 1.3rem;
      }
      .report-btn {
        padding: 1.3rem 1.2rem;
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="icon-wrapper">
        <!-- icon.png cùng thư mục, nếu chưa có sẽ hiển thị fallback emoji -->
        <img src="icon.png" alt="Logo" class="page-icon" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=font-size:3.2rem;>📊</span>';">
      </div>
      <h1>HỆ THỐNG TẠO BÁO CÁO <br>BAN CÔNG TÁC & CỘNG TÁC VIÊN 35<br></h1>
      <div class="subtitle">PHƯỜNG THANH KHÊ THÀNH PHỐ ĐÀ NẴNG</div>
    </div>

    <div class="button-panel">
      <!-- Nút BCT 35 - chuyển thẳng đến tệp -->
      <a class="report-btn btn-bct" href="AppBanCongTac.html">
        <span class="btn-icon">📋</span>
        <div class="btn-text">
          <span class="btn-title">BCT 35</span>
          <span class="btn-desc">Ban công tác</span>
        </div>
      </a>

      <!-- Nút CTV 35 - chuyển thẳng đến tệp -->
      <a class="report-btn btn-ctv" href="AppCongTacVien.html">
        <span class="btn-icon">📝</span>
        <div class="btn-text">
          <span class="btn-title">CTV 35</span>
          <span class="btn-desc">Cộng tác viên</span>
        </div>
      </a>
    </div>
    <div class="footer-note">
      Nhấn vào nút để mở báo cáo tương ứng
    </div>
  </div>
</body>
</html>
